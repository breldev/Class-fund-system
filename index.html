<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class Fund Auditor</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>📊 Class Fund Auditor System</h1>

  <div class="card">
    <h3>📅 Start Date</h3>
    <input type="date" id="startDate" onchange="saveSettings()">
  </div>

  <div class="card">
    <input id="searchInput" placeholder="🔍 Search student..." oninput="render()">
  </div>

  <div class="card">
    <h3>Add Student</h3>
    <input id="studentName" placeholder="Enter name">
    <button onclick="addStudent()">Add</button>
  </div>

  <div class="card">
    <h3>Add Payment</h3>
    <select id="studentSelect"></select>
    <input id="paymentAmount" type="number" placeholder="Amount">
    <button onclick="addPayment()">Add</button>
  </div>

  <div class="dashboard">

    <div class="card"><h3>Students</h3><span id="studentCount">0</span></div>
    <div class="card"><h3>Collected</h3><span id="collected">₱0</span></div>
    <div class="card"><h3>Expected</h3><span id="expected">₱0</span></div>
    <div class="card"><h3>Remaining</h3><span id="remaining">₱0</span></div>
    <div class="card"><h3>Updated</h3><span id="updatedCount">0</span></div>
    <div class="card"><h3>Advanced</h3><span id="advancedCount">0</span></div>
    <div class="card">
  <h3>🎉 Event Fund (70%)</h3>
  <span id="eventFund">₱0</span>
</div>

<div class="card">
  <h3>🛡️ Reserve Fund (30%)</h3>
  <span id="reserveFund">₱0</span>
</div>

  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Paid</th>
          <th>Weeks</th>
          <th>Debt</th>
          <th>Status</th>
          <th>History</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="studentTable"></tbody>
    </table>
  </div>

</div>

<script src="app.js"></script>
<div class="kitten"></div>
</body>
</html>
